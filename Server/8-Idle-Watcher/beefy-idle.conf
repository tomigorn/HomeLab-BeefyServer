# beefy-idle-watcher tunables. Sourced by systemd (EnvironmentFile).
# NOTE: systemd does NOT support inline '# comments' after a value — keep
# comments on their own lines only. Restart after editing:
#   sudo systemctl restart beefy-idle-watcher

# 1 = log only (default until validated); 0 = actually poweroff
DRY_RUN=1

IDLE_MINUTES=15

# seconds between samples
SAMPLE_INTERVAL=60

# whole-host CPU% over the interval
CPU_BUSY_PCT=15

# primary-NIC throughput (rx+tx), kB/s
NET_BUSY_KBPS=200

# data-disk read+write, kB/s
DISK_BUSY_KBPS=2000

PRIMARY_NIC=enp6s0

# /proc/diskstats basenames (data disks; NOT the OS nvme)
DATA_DISKS="sda sdb sdc"

# ports the inbound-connection probe ignores
EXCLUDE_PORTS="22"

INHIBIT_FILE=/run/beefy-keep-awake
