# beefy-idle-watcher tunables. Sourced by systemd (EnvironmentFile).
# Restart after editing:  systemctl restart beefy-idle-watcher
DRY_RUN=1                 # 1 = log only (default until validated); 0 = actually poweroff
IDLE_MINUTES=15
SAMPLE_INTERVAL=60        # seconds between samples
CPU_BUSY_PCT=15           # whole-host CPU% over the interval
NET_BUSY_KBPS=200         # primary-NIC throughput (rx+tx), kB/s
DISK_BUSY_KBPS=2000       # data-disk read+write, kB/s
PRIMARY_NIC=enp6s0
DATA_DISKS="sda sdb sdc"  # /proc/diskstats basenames (data disks; NOT the OS nvme)
EXCLUDE_PORTS="22"        # ports the inbound-conn probe ignores
INHIBIT_FILE=/run/beefy-keep-awake
