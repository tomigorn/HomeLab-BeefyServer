// Beefy idle-watcher: hold the watcher's inhibit during apt/dpkg so beefy can't
// power off mid-transaction (which could corrupt the dpkg database). A sentinel
// (.apt) ensures the inhibit is dropped only if APT set it — never clobber a
// manual `touch /run/beefy-keep-awake`.
DPkg::Pre-Invoke  { "[ -e /run/beefy-keep-awake ] || : > /run/beefy-keep-awake.apt; touch /run/beefy-keep-awake"; };
DPkg::Post-Invoke { "[ -e /run/beefy-keep-awake.apt ] && rm -f /run/beefy-keep-awake /run/beefy-keep-awake.apt; true"; };
